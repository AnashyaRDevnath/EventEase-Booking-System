name: .NET Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EventEase_Booking/EventEase_Booking.csproj

      - name: Build
        run: dotnet build EventEase_Booking/EventEase_Booking.csproj --no-restore
